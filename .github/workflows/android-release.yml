# .github/workflows/android-release.yml
#
# Build a signed Android APK and publish it as a GitHub Release
# every time code is pushed to the `master` branch.
#
# ─── Prerequisites (set in repo Settings → Secrets and variables → Actions) ───
#
#   KEYSTORE_BASE64    Base64-encoded .jks / .keystore file
#                      Generate:  keytool -genkey -v -keystore maternellea.keystore \
#                                   -alias maternellea -keyalg RSA -keysize 2048 \
#                                   -validity 10000
#                      Encode:    base64 -i maternellea.keystore | pbcopy   (macOS)
#                                 base64 maternellea.keystore               (Linux)
#
#   KEY_ALIAS          The alias used above (e.g. "maternellea")
#   KEY_PASSWORD       Keystore password
#   STORE_PASSWORD     Store password (often same as KEY_PASSWORD)
#
# ─── Optional secrets ─────────────────────────────────────────────────────────
#
#   GITHUB_TOKEN       Auto-provided by GitHub — no setup needed
#   SENTRY_AUTH_TOKEN  Pour le tracking des erreurs (optionnel)
#
# ─── First-time setup ──────────────────────────────────────────────────────────
#
#   1. Add the 4 secrets above in repo Settings
#   2. Push to master — the workflow builds and releases the APK

name: Android APK — Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type de release'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION:  '20'
  JAVA_VERSION:  '17'
  RN_VERSION:    '0.76.5'
  APP_NAME:      'Maternellea'
  BUNDLE_ID:     'com.maternellea.app'

jobs:
  build-and-release:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version tag
        id: version
        run: |
          TAG="v$(date -u +'%Y.%m.%d.%H%M')"
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((COMMIT_COUNT + 100))
          
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "release_name=Maternellea ${{ github.event.inputs.release_type }} ($TAG)" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=Maternellea $TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Scaffold Android native project
        run: |
          if [ ! -d "android" ]; then
            echo "📱 Création du projet Android..."
            npx @react-native-community/cli@latest init MaternelleaTemp \
              --skip-install \
              --directory /tmp/rn-template \
              --title "${{ env.APP_NAME }}" \
              --package "${{ env.BUNDLE_ID }}"
            
            if [ -d "/tmp/rn-template/android" ]; then
              cp -r /tmp/rn-template/android ./android
              echo "✅ Dossier android copié"
              rm -rf /tmp/rn-template
            else
              echo "❌ Erreur : dossier android non généré"
              exit 1
            fi
          else
            echo "✅ Dossier Android existant, utilisation existante"
          fi
          
          mkdir -p android/app/src/main/assets

      - name: Update package.json version
        run: |
          npm version ${{ steps.version.outputs.version_name }} --no-git-tag-version || true

      - name: Patch versionCode and versionName
        run: |
          sed -i \
            "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.version_code }}/g" \
            android/app/build.gradle
          
          sed -i \
            "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.version_name }}\"/g" \
            android/app/build.gradle
          
          echo "✅ Version patchée: code=${{ steps.version.outputs.version_code }}, name=${{ steps.version.outputs.version_name }}"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/maternellea.keystore
            echo "✅ Keystore décodé avec succès"
          else
            echo "⚠️ KEYSTORE_BASE64 non défini, signature ignorée"
          fi

      - name: Write gradle signing config
        env:
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ] && [ -n "$STORE_PASSWORD" ]; then
            sed -i '/MYAPP_UPLOAD_STORE_FILE/d' android/gradle.properties || true
            sed -i '/MYAPP_UPLOAD_KEY_ALIAS/d' android/gradle.properties || true
            sed -i '/MYAPP_UPLOAD_STORE_PASSWORD/d' android/gradle.properties || true
            sed -i '/MYAPP_UPLOAD_KEY_PASSWORD/d' android/gradle.properties || true
            
            cat >> android/gradle.properties << EOF
MYAPP_UPLOAD_STORE_FILE=maternellea.keystore
MYAPP_UPLOAD_KEY_ALIAS=${KEY_ALIAS}
MYAPP_UPLOAD_STORE_PASSWORD=${STORE_PASSWORD}
MYAPP_UPLOAD_KEY_PASSWORD=${KEY_PASSWORD}
EOF
            
            echo "✅ Configuration de signature ajoutée"
          else
            echo "⚠️ Secrets de signature non définis, build non signé"
          fi

      - name: Patch build.gradle with signingConfigs
        run: |
          python3 << 'PYEOF'
import re
import pathlib

path = pathlib.Path('android/app/build.gradle')
text = path.read_text()

if 'signingConfigs {' not in text:
    signing_config = '''

    signingConfigs {
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }
'''
    
    text = re.sub(
        r'(android\s*\{)',
        r'\1' + signing_config,
        text, count=1
    )
    
    text = re.sub(
        r'(buildTypes\s*\{[^}]*release\s*\{)',
        r'\1\n            signingConfig signingConfigs.release',
        text, count=1
    )
    
    path.write_text(text)
    print('✅ build.gradle patched with signing config')
else:
    print('✅ Signing config already present')
PYEOF

      - name: Create JS bundle for Android
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
          
          echo "✅ Bundle JS créé avec succès"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          JAVA_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Collect and rename artifacts
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          
          mkdir -p artifacts
          
          APK_UNIVERSAL="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_UNIVERSAL" ]; then
            cp "$APK_UNIVERSAL" "artifacts/Maternellea-${TAG}-universal.apk"
            echo "✅ APK universel créé"
          fi
          
          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            APK_ARCH="android/app/build/outputs/apk/release/app-${arch}-release.apk"
            if [ -f "$APK_ARCH" ]; then
              cp "$APK_ARCH" "artifacts/Maternellea-${TAG}-${arch}.apk"
              echo "✅ APK pour $arch créé"
            fi
          done
          
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB" ]; then
            cp "$AAB" "artifacts/Maternellea-${TAG}.aab"
            echo "✅ AAB créé"
          fi
          
          cd artifacts
          sha256sum * > checksums.txt
          cd ..
          
          echo "📦 Artifacts générés :"
          ls -lh artifacts/
          
          echo "ARTIFACTS_PATH=artifacts" >> "$GITHUB_ENV"

      - name: Upload artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: maternellea-build-${{ steps.version.outputs.tag }}
          path: ${{ env.ARTIFACTS_PATH }}
          retention-days: 30
          compression-level: 6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          body: |
            ## 🚀 Maternellea — ${{ steps.version.outputs.release_name }}
            
            ### 📱 Téléchargement
            
            | Type | Fichier | Description |
            |------|---------|-------------|
            | **APK Universal** | `Maternellea-${{ steps.version.outputs.tag }}-universal.apk` | Compatible avec tous les appareils Android |
            | **APK ARM64** | `Maternellea-${{ steps.version.outputs.tag }}-arm64-v8a.apk` | Optimisé pour les appareils modernes |
            | **APK ARMv7** | `Maternellea-${{ steps.version.outputs.tag }}-armeabi-v7a.apk` | Pour les appareils plus anciens |
            | **AAB** | `Maternellea-${{ steps.version.outputs.tag }}.aab` | Pour le Play Store |
            
            ### 📋 Informations de build
            
            - **Version:** ${{ steps.version.outputs.version_name }}
            - **Version Code:** ${{ steps.version.outputs.version_code }}
            - **Branch:** `${{ github.ref_name }}`
            - **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - **React Native:** ${{ env.RN_VERSION }}
            
            ### ✅ Checksums
            
            Les checksums SHA256 sont disponibles dans le fichier `checksums.txt` inclus dans les artifacts.
          files: ${{ env.ARTIFACTS_PATH }}/*
          draft: false
          prerelease: false