name: Android APK — Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type de release"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  RN_VERSION: "0.76.5"
  RN_CLI_VERSION: "15.1.3"
  APP_NAME: "Maternellea"
  BUNDLE_ID: "com.maternellea.app"

jobs:
  build-and-release:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version tag
        id: version
        shell: bash
        run: |
          TAG="v$(date -u +'%Y.%m.%d.%H%M')"
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((COMMIT_COUNT + 100))

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "release_name=Maternellea ${{ github.event.inputs.release_type }} ($TAG)" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=Maternellea $TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install npm dependencies
        shell: bash
        run: |
          # Correction temporaire pour Reanimated 3.16+ qui a un check de version buggé sur RN 0.76
          npm install --legacy-peer-deps
          
          # Patch Reanimated assertion if it exists
          REANIMATED_GRADLE="node_modules/react-native-reanimated/android/build.gradle"
          if [ -f "$REANIMATED_GRADLE" ]; then
            sed -i 's/throw new GradleException("\[Reanimated\]/println("\[Reanimated\] SKIPPED: /g' "$REANIMATED_GRADLE"
            echo "✅ Reanimated version check patched"
          fi

      - name: Ensure React Native CLI is installed
        shell: bash
        run: |
          npm install -D @react-native-community/cli@${{ env.RN_CLI_VERSION }} --legacy-peer-deps

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Scaffold Android native project
        shell: bash
        run: |
          if [ ! -f "android/build.gradle" ]; then
            echo "📱 Création du projet Android (manquant ou incomplet)..."
            rm -rf android # Nettoyage complet
            
            # Utilisation de init-native pour générer les dossiers natifs
            npx @react-native-community/cli@${{ env.RN_CLI_VERSION }} init-native android \
              --platform android \
              --project-name maternellea \
              --template react-native-template-typescript

            # Vérification du succès
            if [ ! -f "android/build.gradle" ]; then
              echo "❌ Échec de la génération automatique, tentative via init complet..."
              rm -rf /tmp/rn-template
              npx @react-native-community/cli@${{ env.RN_CLI_VERSION }} init MaternelleaTemp \
                --version ${{ env.RN_VERSION }} --skip-install --directory /tmp/rn-template
              cp -r /tmp/rn-template/android ./android
              cp -r /tmp/rn-template/ios ./ios
            fi
            echo "✅ Dossier android prêt"
          else
            echo "✅ Dossier Android valide existant"
          fi
          mkdir -p android/app/src/main/assets

      - name: Patch versionCode and versionName
        shell: bash
        run: |
          sed -i \
            "s/versionCode [0-9]\+/versionCode ${{ steps.version.outputs.version_code }}/g" \
            android/app/build.gradle

          sed -i \
            "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.version_name }}\"/g" \
            android/app/build.gradle

          echo "✅ Version patchée: code=${{ steps.version.outputs.version_code }}, name=${{ steps.version.outputs.version_name }}"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        shell: bash
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/maternellea.keystore
            echo "✅ Keystore décodé avec succès"
          else
            echo "⚠️ KEYSTORE_BASE64 non défini, signature ignorée"
          fi

      - name: Write gradle signing config & Fix New Arch
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        shell: bash
        run: |
          # 1. Config de signature
          if [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ] && [ -n "$STORE_PASSWORD" ]; then
            touch android/gradle.properties
            sed -i '/^MYAPP_UPLOAD_STORE_FILE=/d' android/gradle.properties || true
            sed -i '/^MYAPP_UPLOAD_KEY_ALIAS=/d' android/gradle.properties || true
            sed -i '/^MYAPP_UPLOAD_STORE_PASSWORD=/d' android/gradle.properties || true
            sed -i '/^MYAPP_UPLOAD_KEY_PASSWORD=/d' android/gradle.properties || true
            {
              echo "MYAPP_UPLOAD_STORE_FILE=maternellea.keystore"
              echo "MYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS"
              echo "MYAPP_UPLOAD_STORE_PASSWORD=$STORE_PASSWORD"
              echo "MYAPP_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD"
            } >> android/gradle.properties
            echo "✅ Configuration de signature ajoutée"
          fi

          # 2. Forcer New Architecture si nécessaire ou assurer Hermes
          # Note: React Native 0.76 préfère New Arch, mais on peut forcer true/false ici
          # On s'assure que hermesEnabled est true pour la performance
          if ! grep -q "hermesEnabled" android/gradle.properties; then
            echo "hermesEnabled=true" >> android/gradle.properties
          fi
          
          # 3. Patch pour cmake_path si nécessaire (connu pour corriger certains linking errors)
          echo "android.ndkVersion=26.1.10909125" >> android/gradle.properties

      - name: Patch build.gradle (Signing & Icons)
        shell: bash
        run: |
          # 1. Ajout de react-native-vector-icons
          VG_LINE="apply from: \"../../node_modules/react-native-vector-icons/fonts.gradle\""
          if ! grep -q "react-native-vector-icons/fonts.gradle" android/app/build.gradle; then
            sed -i "/apply plugin: \"com.android.application\"/a $VG_LINE" android/app/build.gradle
            echo "✅ Vector Icons link ajouté"
          fi

          # 2. Patching des signingConfigs via Python pour plus de robustesse
          python3 << 'PYEOF'
          import pathlib
          import re

          path = pathlib.Path("android/app/build.gradle")
          text = path.read_text(encoding="utf-8")

          # 1. Injection de la config de release dans signingConfigs
          if "release {" not in text or "MYAPP_UPLOAD_STORE_FILE" not in text:
              signing_config = """
              release {
                  if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD
                  }
              }"""
              if "signingConfigs {" in text:
                  text = re.sub(r"(signingConfigs\s*\{)", r"\1" + signing_config, text, count=1)
              else:
                  text = re.sub(r"(android\s*\{)", r"\1\n    signingConfigs {" + signing_config + "\n    }", text, count=1)

          # 2. Assignation de la config au buildType release
          # On cherche spécifiquement le bloc release { qui est EN DESSOUS de buildTypes {
          # On utilise une recherche qui englobe buildTypes { ... release {
          pattern = r"(buildTypes\s*\{[^{}]*release\s*\{)"
          if "signingConfig signingConfigs.release" not in text:
              # On s'assure de ne pas patcher le bloc signingConfigs.release par erreur
              # On cherche l'occurrence qui vient après 'buildTypes'
              def replace_bt(match):
                  if "signingConfig signingConfigs.release" in match.group(0):
                      return match.group(0)
                  return match.group(1) + "\n            signingConfig signingConfigs.release"
              
              text = re.sub(pattern, replace_bt, text, flags=re.DOTALL)

          path.write_text(text, encoding="utf-8")
          print("✅ build.gradle patched successfully")
          PYEOF
          

      - name: Pre-build check
        shell: bash
        run: |
          echo "🔍 Vérification du dossier assets..."
          mkdir -p android/app/src/main/assets
          ls -R android/app/src/main/res/drawable-* 2>/dev/null || echo "No res drawables yet"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build release APK and AAB
        working-directory: android
        shell: bash
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect and rename artifacts
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          mkdir -p artifacts

          APK_UNIVERSAL="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_UNIVERSAL" ]; then
            cp "$APK_UNIVERSAL" "artifacts/Maternellea-${TAG}-universal.apk"
            echo "✅ APK universel créé"
          fi

          for arch in arm64-v8a armeabi-v7a x86 x86_64; do
            APK_ARCH="android/app/build/outputs/apk/release/app-${arch}-release.apk"
            if [ -f "$APK_ARCH" ]; then
              cp "$APK_ARCH" "artifacts/Maternellea-${TAG}-${arch}.apk"
              echo "✅ APK pour $arch créé"
            fi
          done

          # AAB désactivé selon la demande de l'utilisateur
          # AAB="android/app/build/outputs/bundle/release/app-release.aab"
          # if [ -f "$AAB" ]; then
          #   cp "$AAB" "artifacts/Maternellea-${TAG}.aab"
          #   echo "✅ AAB créé"
          # fi

          if [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "❌ Aucun artifact n'a été généré"
            exit 1
          fi

          (
            cd artifacts
            sha256sum * > checksums.txt
          )

          echo "📦 Artifacts générés :"
          ls -lh artifacts/

          echo "ARTIFACTS_PATH=artifacts" >> "$GITHUB_ENV"

      - name: Upload artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: maternellea-build-${{ steps.version.outputs.tag }}
          path: ${{ env.ARTIFACTS_PATH }}
          retention-days: 30
          compression-level: 6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          body: |
            ## 🚀 Maternellea — ${{ steps.version.outputs.release_name }}

            ### 📱 Téléchargement

            | Type | Fichier | Description |
            |------|---------|-------------|
            | **APK Universal** | `Maternellea-${{ steps.version.outputs.tag }}-universal.apk` | Compatible avec tous les appareils Android |
            | **APK ARM64** | `Maternellea-${{ steps.version.outputs.tag }}-arm64-v8a.apk` | Optimisé pour les appareils modernes |
            | **APK ARMv7** | `Maternellea-${{ steps.version.outputs.tag }}-armeabi-v7a.apk` | Pour les appareils plus anciens |

            ### 📋 Informations de build

            - **Version:** ${{ steps.version.outputs.version_name }}
            - **Version Code:** ${{ steps.version.outputs.version_code }}
            - **Branch:** `${{ github.ref_name }}`
            - **Commit:** `${{ github.sha }}`
            - **React Native:** ${{ env.RN_VERSION }}

            ### ✅ Checksums

            Les checksums SHA256 sont disponibles dans le fichier `checksums.txt`.
          files: ${{ env.ARTIFACTS_PATH }}/*
          draft: false
          prerelease: false